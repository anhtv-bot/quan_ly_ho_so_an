version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quanlyhosoan_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8001}
      - SUBDOMAIN=${SUBDOMAIN:-your-subdomain}
    ports:
      - "${PORT:-8001}:8001"
    volumes:
      - db_data:/app/data

volumes:
  db_data:
